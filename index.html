<!doctype html>
<html>
  <head>
    <title>JavaScript Lab</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="./modules/fetch/fetch.css" />
    <link rel="stylesheet" href="./modules/canvas/canvas.css" />
    <link rel="stylesheet" href="./modules/debounce/debounce.css" />
    <link rel="stylesheet" href="./modules/throttle/throttle.css" />
    <link rel="stylesheet" href="./modules/eventloop/eventloop.css" />
  </head>
  <body>
    <div class="app-bg"></div>

    <header class="hero">
      <h1>JavaScript Lab</h1>
      <p>Interactive playground for mastering core JS concepts</p>
    </header>

    <div class="js-lab__options">
      <h2>Select a Card</h2>

      <div class="js-lab__cards-grid">
        <div class="js-lab__card" data-panel="eventloop">
          <h3>Event Loop</h3>
          <p>Understand sync, micro & macro tasks visually</p>
        </div>

        <div class="js-lab__card" data-panel="fetch">
          <h3>Fetch API</h3>
          <p>Test APIs like a mini Postman</p>
        </div>

        <div class="js-lab__card" data-panel="debounce">
          <h3>Debounce</h3>
          <p>Control rapid input behavior</p>
        </div>

        <div class="js-lab__card" data-panel="throttle">
          <h3>Throttle</h3>
          <p>Limit execution frequency</p>
        </div>

        <div class="js-lab__card highlight" data-panel="canvas">
          <h3>Space Game</h3>
          <p>Canvas & Classes</p>
        </div>
      </div>
    </div>

    <div class="js-lab__interactive-panel"></div>

    <script type="module" src="main.js"></script>
  </body>
</html>
